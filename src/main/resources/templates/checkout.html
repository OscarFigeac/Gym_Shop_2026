<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Confirm Order | GYMSHOP</title>
    <script src="https://js.stripe.com/v3/"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --brand-orange: #f47920;
            --brand-dark: #232323;
        }

        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .checkout-box {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .order-total-box {
            background: var(--brand-dark);
            color: white;
            border-radius: 10px;
            padding: 20px;
        }

        .btn-confirm {
            background: var(--brand-orange);
            color: white;
            font-weight: 800;
            border: none;
            padding: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main class="container py-5">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="checkout-box mb-4">
                <h4 class="fw-bold mb-4 text-uppercase">Review <span style="color: var(--brand-orange)">Order</span>
                </h4>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <tbody>
                        <tr th:each="item : ${basket.items}">
                            <td>
                                <span class="fw-bold" th:text="${item.itemQuantity} + 'x'">1x</span>
                                <span th:text="${item.productId}">Product Name</span>
                            </td>
                            <td class="text-end fw-bold" th:text="'€' + ${item.itemQuantity * 29.99}">€0.00</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="checkout-box">
                <h4 class="fw-bold mb-4 text-uppercase">Secure <span style="color: var(--brand-orange)">Payment</span>
                </h4>

                <div id="payment-element"></div>
                <div id="error-message" class="text-danger mt-3"></div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="order-total-box shadow">
                <h5 class="text-uppercase opacity-50 small fw-bold mb-3">Order Total</h5>
                <div class="d-flex justify-content-between align-items-end mb-4">
                    <h2 class="mb-0 fw-bold">Total Amount</h2>
                    <h2 class="mb-0 fw-black" style="color: var(--brand-orange)" th:text="'€' + ${orderTotal}">
                        €0.00</h2>
                </div>
                <button id="submit-button" class="btn btn-confirm w-100 text-uppercase shadow-sm">
                    Place Order Now <i class="bi bi-shield-check ms-2"></i>
                </button>
            </div>
        </div>
    </div>
</main>

<script>
    const stripe = Stripe('pk_test_51TNL8dGnoXtKQ2Pxz0912QSuPECaWZ9DxGDr57GrosRb7bcG39kTP51OFzrwOXChVj0a1BRJaxBEMRkaj4EslagC00Ej6gLYeH');
    let elements;

    async function initialize() {
        const response = await fetch("/checkout/charge", {method: "POST"});
        const clientSecret = await response.text();

        elements = stripe.elements({clientSecret});
        const paymentElement = elements.create("payment");
        paymentElement.mount("#payment-element");
    }

    document.querySelector("#submit-button").addEventListener("click", async () => {
        const {error} = await stripe.confirmPayment({
            elements,
            confirmParams: {
                return_url: "http://localhost:8080/checkout/success",
            },
        });

        if (error) {
            document.querySelector("#error-message").textContent = error.message;
        }
    });

    initialize();
</script>

</body>
</html>
