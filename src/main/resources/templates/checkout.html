<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Confirm Order | GYMSHOP</title>
    <script src="https://js.stripe.com/v3/"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --brand-orange: #f47920;
            --brand-dark: #232323;
        }

        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .checkout-box {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .order-total-box {
            background: var(--brand-dark);
            color: white;
            border-radius: 10px;
            padding: 20px;
        }

        .btn-confirm {
            background: var(--brand-orange);
            color: white;
            font-weight: 800;
            border: none;
            padding: 15px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-confirm:hover {
            opacity: 0.9;
            color: white;
        }

        .btn-confirm:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .spinner {
            display: none;
            width: 1rem;
            height: 1rem;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main class="container py-5">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="checkout-box mb-4">
                <h4 class="fw-bold mb-4 text-uppercase">Review <span style="color: var(--brand-orange)">Order</span></h4>
                <table class="table align-middle">
                    <tbody>
                    <tr th:each="item : ${basket.items}">
                        <td>
                            <span class="fw-bold" th:text="${item.item_quantity} + 'x'">1x</span>
                            <span class="ms-2" th:text="${item.product.name}">Product Name</span>
                        </td>
                        <td class="text-end fw-bold" th:text="'€' + ${#numbers.formatDecimal(item.item_quantity * item.product.price, 1, 2)}">€0.00</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="checkout-box mb-4">
                <h4 class="fw-bold mb-4 text-uppercase">Select <span style="color: var(--brand-orange)">Payment Method</span></h4>
                <div class="list-group">
                    <label class="list-group-item d-flex align-items-center">
                        <input class="form-check-input me-3" type="radio" name="methodId" value="0" checked>
                        <span>Use a new credit or debit card</span>
                    </label>

                    <label class="list-group-item d-flex align-items-center" th:each="method : ${paymentMethods}">
                        <input class="form-check-input me-3" type="radio" name="methodId" th:value="${method.methodId}">
                        <span th:text="${method.cardType + ' ending in ' + method.lastFourDigits}">Visa ending in 4242</span>
                    </label>
                </div>
            </div>

            <div class="checkout-box">
                <h4 class="fw-bold mb-4 text-uppercase">Card <span style="color: var(--brand-orange)">Details</span></h4>
                <div id="payment-element"></div>
                <div id="error-message" class="text-danger mt-3 fw-bold"></div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="order-total-box shadow sticky-top" style="top: 20px;">
                <h5 class="text-uppercase opacity-50 small fw-bold mb-3">Order Total</h5>
                <h2 class="mb-4 fw-black" style="color: var(--brand-orange)" th:text="'€' + ${#numbers.formatDecimal(grandTotal, 1, 2)}">€0.00</h2>
                <button id="submit-button" class="btn btn-confirm w-100 text-uppercase shadow-sm py-3" disabled>
                    <span id="button-text">Place Order Now</span>
                    <span id="spinner" class="spinner ms-2"></span>
                </button>
            </div>
        </div>
    </div>
</main>

<script>
    const stripe = Stripe('pk_test_51TNL8dGnoXtKQ2Pxz0912QSuPECaWZ9DxGDr57GrosRb7bcG39kTP51OFzrwOXChVj0a1BRJaxBEMRkaj4EslagC00Ej6gLYeH');
    let elements;
    const submitBtn = document.querySelector("#submit-button");
    const errorDiv = document.querySelector("#error-message");

    async function initialize() {
        try {
            const response = await fetch("/checkout/charge", {method: "POST"});
            if (!response.ok) throw new Error("Backend failed to create Payment Intent");

            const clientSecret = await response.text();

            const options = {
                clientSecret,
                appearance: { theme: 'stripe' },
                wallets: {
                    applePay: 'auto',
                    googlePay: 'auto'
                }
            };

            elements = stripe.elements(options);
            const paymentElement = elements.create("payment");

            paymentElement.mount("#payment-element");

            paymentElement.on('ready', () => { submitBtn.disabled = false; });
        } catch (e) {
            console.error("Stripe Load Error:", e);
            errorDiv.textContent = "System Error: Could not initialize payment module.";
        }
    }

    submitBtn.addEventListener("click", async (e) => {
        e.preventDefault();
        setLoading(true);

        const {error, paymentIntent} = await stripe.confirmPayment({
            elements,
            confirmParams: {
                return_url: window.location.origin + "/checkout/success",
            },
            redirect: 'if_required'
        });

        if (error) {
            errorDiv.textContent = error.message;
            setLoading(false);
        } else if (paymentIntent && paymentIntent.status === 'succeeded') {
            const confirmResponse = await fetch("/checkout/confirm", {
                method: "POST",
                headers: {'Content-Type': 'application/json'}
            });

            if (confirmResponse.ok) {
                window.location.href = "/checkout/success";
            } else {
                errorDiv.textContent = "Payment successful, but failed to save order.";
                setLoading(false);
            }
        }
    });

    function setLoading(isLoading) {
        submitBtn.disabled = isLoading;
        document.querySelector("#spinner").style.display = isLoading ? "inline-block" : "none";
    }

    initialize();
</script>
</body>
</html>
