<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Confirm Order | GYMSHOP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --brand-orange: #f47920;
            --brand-dark: #232323;
        }

        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .checkout-box {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .card-selector {
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .card-selector:hover {
            border-color: var(--brand-orange);
        }

        .form-check-input:checked + .card-selector {
            border-color: var(--brand-orange);
            background-color: #fff9f5;
        }

        .order-total-box {
            background: var(--brand-dark);
            color: white;
            border-radius: 10px;
            padding: 20px;
        }

        .btn-confirm {
            background: var(--brand-orange);
            color: white;
            font-weight: 800;
            border: none;
            padding: 15px;
        }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main class="container py-5">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="checkout-box mb-4">
                <h4 class="fw-bold mb-4 text-uppercase">Review <span style="color: var(--brand-orange)">Order</span>
                </h4>

                <div class="table-responsive">
                    <table class="table align-middle">
                        <tbody>
                        <tr th:each="item : ${basket.items}">
                            <td>
                                <span class="fw-bold" th:text="${item.itemQuantity} + 'x'">1x</span>
                                <span th:text="${item.productId}">Product Name</span></td>
                            <td class="text-end fw-bold" th:text="'€' + ${item.itemQuantity * 29.99}">€0.00</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="checkout-box">
                <h4 class="fw-bold mb-4 text-uppercase">Select <span style="color: var(--brand-orange)">Payment</span>
                </h4>

                <form th:action="@{/checkout/confirm}" method="post" id="checkoutForm">
                    <div class="row g-3">
                        <div class="col-12" th:each="method, iter : ${paymentMethods}">
                            <input type="radio" name="methodId" th:value="${method.methodId}"
                                   th:id="'card' + ${method.methodId}" class="form-check-input d-none"
                                   th:checked="${iter.index == 0}" required>

                            <label th:for="'card' + ${method.methodId}"
                                   class="card-selector d-flex align-items-center w-100">
                                <i class="bi bi-credit-card-2-front h3 mb-0 me-3 text-muted"></i>
                                <div class="flex-grow-1">
                                    <p class="mb-0 fw-bold"
                                       th:text="${method.cardType} + ' ending in ' + ${method.lastFourDigits}">VISA
                                        ending in 4242</p>
                                    <small class="text-muted" th:text="'Expires: ' + ${method.expiryDate}">Exp:
                                        12/26</small>
                                </div>
                                <i class="bi bi-check-circle-fill text-orange h4 mb-0 d-none check-icon"></i>
                            </label>
                        </div>
                    </div>

                    <div class="mt-4">
                        <a th:href="@{/payment-methods}" class="small text-decoration-none fw-bold text-muted">
                            <i class="bi bi-plus-lg"></i> Add another card
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="order-total-box shadow">
                <h5 class="text-uppercase opacity-50 small fw-bold mb-3">Order Total</h5>
                <div class="d-flex justify-content-between align-items-end mb-4">
                    <h2 class="mb-0 fw-bold">Total Amount</h2>
                    <h2 class="mb-0 fw-black" style="color: var(--brand-orange)" th:text="'€' + ${orderTotal}">
                        €0.00</h2>
                </div>

                <p class="small opacity-75 mb-4">By clicking "Place Order", you agree to GymShop's terms of service and
                    authorize this transaction.</p>

                <button type="submit" form="checkoutForm" class="btn btn-confirm w-100 text-uppercase shadow-sm">
                    Place Order Now <i class="bi bi-shield-check ms-2"></i>
                </button>
            </div>

            <div class="text-center mt-4">
                <p class="text-muted small"><i class="bi bi-lock-fill"></i> Your transaction is secure and encrypted.
                </p>
            </div>
        </div>
    </div>
</main>

</body>
</html>
