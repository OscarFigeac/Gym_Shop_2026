<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Details | GYMSHOP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --brand-orange: #f47920;
            --brand-dark: #232323;
            --brand-light: #f8f9fa;
        }

        body {
            background-color: var(--brand-light);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--brand-dark);
        }

        .detail-card {
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .detail-header {
            background-color: var(--brand-dark);
            color: white;
            padding: 20px 30px;
        }

        .product-img-placeholder {
            width: 50px;
            height: 50px;
            background-color: #f0f0f0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--brand-orange);
        }

        .table > :not(caption) > * > * {
            padding: 1.2rem 1rem;
        }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main class="container my-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-uppercase mb-0">Order <span style="color: var(--brand-orange)">Details</span></h2>
        <a th:href="@{/dashboard/orders}" class="btn btn-outline-dark btn-sm fw-bold">&larr; Back to History</a>
    </div>

    <div class="detail-card">
        <div class="detail-header d-flex justify-content-between align-items-center">
            <div>
                <p class="small text-uppercase opacity-75 mb-1">Reference Number</p>
                <h5 class="fw-bold mb-0">Order #<span th:text="${orderId}"></span></h5>
            </div>
            <i class="bi bi-box-seam h3 mb-0"></i>
        </div>

        <div class="p-4">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="text-muted small text-uppercase fw-bold">
                    <tr>
                        <th colspan="2">Product</th>
                        <th class="text-center">Qty</th>
                        <th class="text-end">Unit Price</th>
                        <th class="text-end">Subtotal</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${items}">
                        <td style="width: 60px;">
                            <div class="product-img-placeholder">
                                <i class="bi bi-tag-fill"></i>
                            </div>
                        </td>
                        <td>
                            <span class="fw-bold d-block" th:text="${item.product.name}">Product Name</span>
                            <span class="small text-muted">ID: <span th:text="${item.product_id}"></span></span>
                        </td>
                        <td class="text-center fw-bold" th:text="${item.quantity}">1</td>
                        <td class="text-end text-muted" th:text="'€' + ${#numbers.formatDecimal(item.priceAtPurchase, 1, 2)}">€0.00</td>
                        <td class="text-end fw-bold" th:text="'€' + ${#numbers.formatDecimal(item.quantity * item.priceAtPurchase, 1, 2)}">€0.00</td>
                    </tr>
                    </tbody>
                    <tfoot class="border-top-0">
                    <tr>
                        <td colspan="4" class="text-end fw-bold text-uppercase pt-4">Grand Total</td>
                        <td class="text-end pt-4">
                            <h4 class="fw-black mb-0" style="color: var(--brand-orange)"
                                th:text="'€' + ${#numbers.formatDecimal(total, 1, 2)}">
                                €0.00
                            </h4>
                        </td>
                    </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
