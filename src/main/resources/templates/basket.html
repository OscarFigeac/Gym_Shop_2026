<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Your Basket | GYMSHOP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --brand-orange: #f47920;
            --brand-dark: #232323;
        }

        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .basket-container {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .summary-card {
            background: var(--brand-dark);
            color: white;
            border-radius: 12px;
            padding: 25px;
            position: sticky;
            top: 100px;
        }

        .product-img-sm {
            width: 60px;
            height: 60px;
            background: #eee;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-input {
            width: 65px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-weight: bold;
        }

        .btn-checkout {
            background: var(--brand-orange);
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            border: none;
            width: 100%;
            padding: 15px;
            transition: 0.3s;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-checkout:hover {
            background: #d36618;
            color: white;
            transform: translateY(-2px);
        }

        .remove-link {
            color: #dc3545;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            background: none;
            border: none;
        }

        .remove-link:hover {
            text-decoration: underline;
        }

        .product-name-link:hover {
            color: var(--brand-orange) !important;
            text-decoration: underline;
        }

        .product-img-sm {
            width: 80px;
            height: 80px;
            padding: 5px;
        }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main class="container py-5">
    <h2 class="fw-bold mb-4 text-uppercase">Shopping <span style="color: var(--brand-orange)">Basket</span></h2>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="basket-container">
                <div th:if="${#lists.isEmpty(basketItems)}" class="text-center py-5">
                    <i class="bi bi-cart-x display-1 text-muted mb-3"></i>
                    <p class="lead text-muted">Your basket is currently empty. Time to load up!</p>
                    <a th:href="@{/products}" class="btn btn-dark fw-bold px-4">BROWSE PRODUCTS</a>
                </div>

                <div th:unless="${#lists.isEmpty(basketItems)}">
                    <table class="table align-middle">
                        <thead class="text-muted small text-uppercase">
                        <tr>
                            <th>Product</th>
                            <th class="text-center">Quantity</th>
                            <th class="text-end">Subtotal</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${basketItems}">
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="product-img-sm me-3 bg-white border">
                                        <img th:src="${item.product.imageUrl}"
                                             th:alt="${item.productName}"
                                             style="max-width: 100%; max-height: 100%; object-fit: contain;"
                                             onerror="this.src='https://via.placeholder.com/80?text=No+Image'">
                                    </div>

                                    <div>
                                        <a th:href="@{/products/{id}(id=${item.productId})}"
                                           class="text-decoration-none text-dark">
                                            <p class="mb-0 fw-bold product-name-link" th:text="${item.productName}">Product Name</p>
                                        </a>
                                        <p class="mb-0 small text-muted" th:text="'€' + ${#numbers.formatDecimal(item.price, 1, 2)}">€0.00</p>
                                    </div>
                                </div>
                            </td>
                            <td style="width: 150px;">
                                <form th:action="@{/basket/update}" method="post"
                                      class="d-flex justify-content-center align-items-center">
                                    <input type="hidden" name="productId" th:value="${item.productId}">
                                    <input type="number" name="quantity" class="qty-input form-control-sm"
                                           th:value="${item.itemQuantity}" min="1" onchange="this.form.submit()">
                                </form>
                            </td>
                            <td class="text-end fw-bold" th:text="'€' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}">€0.00</td>
                            <td class="text-end">
                                <form th:action="@{/basket/remove/{id}(id=${item.productId})}" method="post">
                                    <button type="submit" class="remove-link">REMOVE</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-4" th:unless="${#lists.isEmpty(basketItems)}">
            <div class="summary-card shadow">
                <h4 class="fw-bold mb-4 text-uppercase border-bottom pb-2"
                    style="border-color: rgba(255,255,255,0.1) !important;">Order Summary</h4>

                <div class="d-flex justify-content-between mb-2">
                    <span class="opacity-75">Items Subtotal</span>
                    <span th:text="'€' + ${#numbers.formatDecimal(totalPrice, 1, 2)}">€0.00</span>
                </div>

                <div class="d-flex justify-content-between mb-4">
                    <span class="opacity-75">Shipping</span>
                    <span class="text-success fw-bold">FREE</span>
                </div>

                <div class="d-flex justify-content-between h4 fw-bold mb-5">
                    <span>Total</span>
                    <span style="color: var(--brand-orange)" th:text="'€' + ${#numbers.formatDecimal(totalPrice, 1, 2)}">€0.00</span>
                </div>

                <a th:href="@{/checkout/begin}" class="btn-checkout">
                    Secure Checkout <i class="bi bi-arrow-right ms-2"></i>
                </a>

                <div class="mt-4 text-center">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" height="15"
                         class="me-2 opacity-50">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" height="20"
                         class="opacity-50">
                </div>
                <p class="text-center mt-3 mb-0 small opacity-50"><i class="bi bi-shield-lock-fill"></i> SSL Encrypted
                    Payment</p>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
