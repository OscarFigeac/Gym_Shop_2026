<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title th:text="${product.name} + ' | GYMSHOP'">Product Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --brand-orange: #f47920;
      --brand-dark: #232323;
    }
    .img-display {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .text-orange { color: var(--brand-orange); }
    .btn-buy-lg {
      background-color: var(--brand-dark);
      color: white;
      font-weight: 700;
      padding: 15px;
      width: 100%;
      border-radius: 8px;
      transition: 0.3s;
    }
    .btn-buy-lg:hover { background-color: var(--brand-orange); color: white; }
    .product-container {
      margin-top: 50px;
      padding: 40px;
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.02);
    }
    h1.display-5 {
      font-weight: 800;
      letter-spacing: -1.5px;
      color: #1a1a1a;
    }
    .info-bar {
      display: flex;
      gap: 15px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
      margin-bottom: 25px;
    }
    .description-text {
      font-size: 1.15rem;
      line-height: 1.8;
      color: #4a4a4a;
      max-width: 90%;
    }
    .price-box {
      background: #f8f9fa;
      display: inline-block;
      padding: 5px 20px;
      border-radius: 8px;
      margin-bottom: 30px;
    }
  </style>
</head>
<body class="bg-light">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container product-container">
  <div class="row g-5">
    <div class="col-md-6">
      <div class="img-display text-center p-5 border rounded-4 bg-white">
        <img th:src="${product.imageUrl}" class="img-fluid" th:alt="${product.name}" style="max-height: 450px;">
      </div>
    </div>

    <div class="col-md-6">
      <h1 class="display-5 mb-1" th:text="${product.name}">Product Name</h1>

      <div class="info-bar">
        <span class="badge rounded-pill text-uppercase px-3" style="background-color: #f47920; color: white;" th:text="${product.productCategory}">Category</span>
        <span class="text-muted small">|</span>
        <span class="text-muted small fw-bold">ID: <span th:text="${product.productId}">000</span></span>
        <span class="text-muted small">|</span>
        <span class="small" th:classappend="${product.quantity < 5} ? 'text-danger fw-bold' : 'text-success'">
          <i class="bi bi-check-circle-fill"></i> <span th:text="${product.quantity}">0</span> in stock
        </span>
      </div>

      <div class="price-box">
        <span class="h1 fw-bolder mb-0" th:text="'€' + ${#numbers.formatDecimal(product.price, 1, 2)}">€0.00</span>
      </div>

      <div class="mb-5">
        <h6 class="text-uppercase fw-bold text-orange mb-3" style="letter-spacing: 1px;">Product Overview</h6>
        <p class="description-text" th:text="${product.description}">Description text...</p>
      </div>

      <div class="p-4 border rounded-4 bg-light">
        <form th:action="@{/basket/add}" method="post">
          <div class="row g-3">
            <div class="col-3">
              <label class="form-label small fw-bold">QUANTITY</label>
              <input type="number" name="quantity" value="1" min="1" class="form-control form-control-lg border-0 shadow-sm">
            </div>
            <div class="col-9">
              <label class="form-label d-block">&nbsp;</label>
              <input type="hidden" name="productId" th:value="${product.productId}">
              <button type="submit" class="btn btn-buy-lg shadow-sm border-0">
                ADD TO BASKET
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="row mt-5 pt-5 border-top">
    <div class="col-md-4 mb-3">
      <div class="p-3 border-start border-4 bg-white shadow-sm" style="border-color: #f47920 !important;">
        <p class="text-muted small mb-1 text-uppercase fw-bold">Category</p>
        <p class="h6 mb-0" th:text="${product.productCategory}">Category Name</p>
      </div>
    </div>
    <div class="col-md-4 mb-3">
      <div class="p-3 border-start border-4 bg-white shadow-sm" style="border-color: #f47920 !important;">
        <p class="text-muted small mb-1 text-uppercase fw-bold">Stock Status</p>
        <p class="h6 mb-0" th:text="${product.quantity > 0 ? 'Ready to Ship' : 'Out of Stock'}">Status</p>
      </div>
    </div>
    <div class="col-md-4 mb-3">
      <div class="p-3 border-start border-4 bg-white shadow-sm" style="border-color: #f47920 !important;">
        <p class="text-muted small mb-1 text-uppercase fw-bold">Merchant</p>
        <p class="h6 mb-0">GYMSHOP Official Store</p>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
