<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Orders | GYMSHOP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --brand-orange: #f47920;
            --brand-dark: #232323;
            --brand-light: #f8f9fa;
        }

        body {
            background-color: var(--brand-light);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--brand-dark);
        }

        .orders-card {
            background: #ffffff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .table > :not(caption) > * > * {
            padding: 1rem 0.5rem;
            border-bottom-color: #f0f0f0;
        }

        .status-badge {
            font-weight: 700;
            font-size: 0.75rem;
            padding: 6px 12px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .status-pending { background-color: #fff3cd; color: #856404; }
        .status-paid { background-color: #d4edda; color: #155724; }
        .status-failed { background-color: #f8d7da; color: #721c24; }
        .status-default { background-color: #e2e3e5; color: #383d41; }

        .txn-id {
            font-family: monospace;
            color: #6c757d;
            background: #f8f9fa;
            padding: 3px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main class="container my-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-uppercase mb-0">Order <span style="color: var(--brand-orange)">History</span></h2>
        <a th:href="@{/dashboard}" class="btn btn-outline-dark btn-sm fw-bold">&larr; Back to Dashboard</a>
    </div>

    <div class="orders-card">
        <div th:if="${#lists.isEmpty(transactions)}" class="text-center py-5">
            <i class="bi bi-receipt display-1 text-muted mb-3 opacity-50"></i>
            <h4 class="fw-bold">No orders found</h4>
            <p class="text-muted mb-4">Looks like you haven't made any purchases yet.</p>
            <a th:href="@{/products}" class="btn btn-dark fw-bold px-4" style="background-color: var(--brand-dark);">START SHOPPING</a>
        </div>

        <div th:unless="${#lists.isEmpty(transactions)}" class="table-responsive">
            <table class="table align-middle">
                <thead class="text-muted small text-uppercase fw-bold border-bottom">
                <tr>
                    <th>Order Ref</th>
                    <th>Date</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="txn : ${transactions}">
                    <td>
                        <span class="fw-bold">Order #<span th:text="${txn.transactionId}"></span></span>
                        <br>
                        <span class="small txn-id" th:if="${txn.stripePaymentIntentId != null}" th:text="${#strings.abbreviate(txn.stripePaymentIntentId, 15)}">pi_123...</span>
                    </td>
                    <td>
                        <span class="fw-bold" th:text="${#temporals.format(txn.transactionDate, 'dd MMM yyyy')}">01 Jan 2026</span><br>
                        <span class="small text-muted" th:text="${#temporals.format(txn.transactionDate, 'HH:mm')}">14:30</span>
                    </td>
                    <td class="fw-bold">
                        <span th:text="${'€' + #numbers.formatDecimal(txn.amountPaid, 1, 2)}">€0.00</span>
                    </td>
                    <td>
                            <span th:classappend="${
                                txn.status == 'PAID' or txn.status == 'COMPLETED' ? 'status-paid' :
                                (txn.status == 'PENDING' ? 'status-pending' :
                                (txn.status == 'FAILED' ? 'status-failed' : 'status-default'))
                            }" class="status-badge" th:text="${txn.status != null ? txn.status : 'UNKNOWN'}">
                                STATUS
                            </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
