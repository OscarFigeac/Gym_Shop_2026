<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Account Settings | GYMSHOP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --brand-orange: #f47920;
        }

        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .btn-orange {
            background: var(--brand-orange);
            color: white;
            font-weight: bold;
            border: none;
        }

        .btn-orange:hover {
            background: #d36618;
            color: white;
        }

        .input-group-text {
            cursor: pointer;
            background: white;
        }
    </style>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="fw-bold mb-4">ACCOUNT <span style="color: var(--brand-orange)">SETTINGS</span></h2>

            <div th:if="${param.success}" class="alert alert-success fw-bold">Password updated successfully!</div>
            <div th:if="${param.error}" class="alert alert-danger fw-bold">Passwords do not match. Please try again.
            </div>

            <div class="card mb-4 p-4 shadow-sm border-0">
                <h5 class="fw-bold border-bottom pb-2">User Profile</h5>
                <label class="small fw-bold text-muted mt-2">USERNAME</label>
                <p class="fw-bold mb-0" th:text="${user.username}">Username</p>
            </div>

            <div class="card p-4 shadow-sm border-0">
                <h5 class="fw-bold border-bottom pb-2">Security & Privacy</h5>
                <form th:action="@{/dashboard/settings/change-password}" method="post">

                    <div class="mb-3">
                        <label class="small fw-bold text-muted">NEW PASSWORD</label>
                        <div class="input-group">
                            <input type="password" id="newPassword" name="newPassword" class="form-control" required>
                            <span class="input-group-text" onclick="togglePassword('newPassword', 'toggleIcon1')">
                                <i class="bi bi-eye" id="toggleIcon1"></i>
                            </span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="small fw-bold text-muted">CONFIRM NEW PASSWORD</label>
                        <div class="input-group">
                            <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                                   required>
                            <span class="input-group-text" onclick="togglePassword('confirmPassword', 'toggleIcon2')">
                                <i class="bi bi-eye" id="toggleIcon2"></i>
                            </span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-orange w-100 py-2">UPDATE PASSWORD</button>
                </form>
            </div>

            <a th:href="@{/dashboard}" class="d-inline-block mt-4 text-dark text-decoration-none fw-bold">
                <i class="bi bi-arrow-left"></i> BACK TO DASHBOARD
            </a>
        </div>
    </div>
</main>

<script>
    function togglePassword(inputId, iconId) {
        const passwordInput = document.getElementById(inputId);
        const toggleIcon = document.getElementById(iconId);

        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            toggleIcon.classList.replace("bi-eye", "bi-eye-slash");
        } else {
            passwordInput.type = "password";
            toggleIcon.classList.replace("bi-eye-slash", "bi-eye");
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
