<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GymShop | Premium Supplements</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .product-card {
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .btn-orange {
            background-color: #f47920;
            color: white;
            border: none;
            font-weight: bold;
        }

        .btn-orange:hover {
            background-color: #d36618;
            color: white;
        }
    </style>
</head>
<body class="bg-light">

<header th:replace="~{fragments/header :: header}"></header>

<section class="bg-dark text-white py-5 mb-5"
         style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=1350&q=80') center/cover;">
    <div class="container py-5 text-center">
        <h1 class="display-3 fw-bolder text-uppercase">Fuel Your <span style="color: #f47920;">Gains</span></h1>
        <p class="lead">Premium quality supplements for the modern athlete.</p>
        <a th:href="@{/products}" class="btn btn-lg btn-orange px-5 mt-3">SHOP NOW</a>
    </div>
</section>

<main class="container">
    <h2 class="fw-bold mb-4">FEATURED <span style="color: #f47920;">PRODUCTS</span></h2>

    <div th:if="${#lists.isEmpty(products)}" class="text-center py-5 bg-white rounded shadow-sm">
        <i class="bi bi-box-seam display-1 text-muted opacity-25"></i>
        <p class="text-muted mt-3 h5">No supplements found in the locker yet!</p>
        <small class="text-muted">Check back soon for new arrivals.</small>
    </div>

    <div th:unless="${#lists.isEmpty(products)}" class="row g-4 mb-5">
        <div class="col-md-4 col-lg-3" th:each="product : ${products}">
            <div class="card h-100 product-card shadow-sm">
                <div class="p-4 text-center bg-light">
                    <i class="bi bi-droplet-fill display-4 text-muted"></i>
                </div>
                <div class="card-body">
                    <h6 class="text-uppercase fw-bold mb-1" th:text="${product.name}">Product Name</h6>
                    <p class="text-muted small mb-2" th:text="${product.productCategory}">Category</p>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="h5 mb-0 fw-bold" th:text="'€' + ${product.price}">€0.00</span>
                        <form th:action="@{/basket/add}" method="post">
                            <input type="hidden" name="productId" th:value="${product.productId}">
                            <button type="submit" class="btn btn-sm btn-dark">
                                <i class="bi bi-cart-plus"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
