<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join the Club | GYMSHOP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #f47920;
            --brand-dark: #232323;
            --brand-light: #f8f9fa;
        }

        body {
            background-color: var(--brand-light);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--brand-dark);
        }

        .register-card {
            border: none;
            border-top: 4px solid var(--brand-orange);
            background: #ffffff;
            padding: 40px;
            margin-top: 60px;
            margin-bottom: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-radius: 8px;
        }

        .register-header {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
            color: var(--brand-dark);
        }

        .form-label {
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 8px;
        }

        .form-control {
            border: 1px solid #ddd;
            padding: 12px 15px;
            border-radius: 4px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: var(--brand-orange);
            box-shadow: 0 0 0 3px rgba(244, 121, 32, 0.15);
        }

        /* Matches the class used in your JavaScript .querySelector */
        .btn-primary-gym {
            background-color: var(--brand-dark);
            color: #fff;
            border: none;
            padding: 14px;
            font-weight: 700;
            text-transform: uppercase;
            width: 100%;
            transition: all 0.2s;
            border-radius: 4px;
            margin-top: 10px;
        }

        .btn-primary-gym:hover {
            background-color: var(--brand-orange);
            transform: translateY(-1px);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--brand-orange);
            font-weight: 700;
            font-size: 0.75rem;
            user-select: none;
        }

        .login-footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #777;
        }

        .login-footer a {
            color: var(--brand-orange);
            text-decoration: none;
            font-weight: 700;
        }

        /* Error/Validation styles */
        .was-validated .form-control:invalid {
            border-color: #dc3545;
        }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <div class="register-card">
                <h2 class="register-header text-center">Create Your Account</h2>

                <form id="registerForm" th:action="@{/register}" method="post" class="needs-validation" novalidate>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="fName" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="fName" name="fName" placeholder="Enter first name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="lName" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="lName" name="lName" placeholder="Enter last name" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="eMail" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="eMail" name="eMail" placeholder="name@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="reg-username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="reg-username" name="username" placeholder="Choose a unique username" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="reg-password" class="form-label">Password</label>
                            <div class="password-wrapper">
                                <input type="password" class="form-control" id="reg-password" name="password" placeholder="Min 8 characters" required>
                                <span class="toggle-password" onclick="togglePass('reg-password')">SHOW</span>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="passRepeat" class="form-label">Repeat Password</label>
                            <div class="password-wrapper">
                                <input type="password" class="form-control" id="passRepeat" name="passRepeat" placeholder="Confirm password" required>
                                <span class="toggle-password" onclick="togglePass('passRepeat')">SHOW</span>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary-gym">Join the Club</button>

                    <div class="text-center login-footer">
                        Already a member? <a th:href="@{/login}">Log In Here</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/validation.js"></script>

</body>
</html>
